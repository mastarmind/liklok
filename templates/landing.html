<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='tiktok.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body class="feed-body">

<!-- LOGIN POPUP (hidden initially) -->
<div class="login-modal" id="loginModal">
    <div class="login-box">
        <h2>Continue Watching</h2>
        <a href="/login" class="login-btn-big">Login</a>
    </div>
</div>

<!-- VIDEO FEED -->
<div class="feed-container" id="feed">

    {% for video in videos %}

    <div class="video-card">

        <video class="video-player" id="mainVideo" muted autoplay>
            <source src="{{ url_for('static', filename=video.file) }}" type="video/mp4">
        </video>

        <div class="overlay">
            <div class="video-info">
                <h3>{{ video.caption }}</h3>
                <p>{{ video.username }}</p>
            </div>
        </div>

    </div>

    {% endfor %}

</div>

<!-- SCRIPT -->
<script>
const modal = document.getElementById("loginModal");
const video = document.getElementById("mainVideo");

// only allow FIRST video
video.play();

// when video ends OR after 5 seconds → show login
video.onended = showLogin;

setTimeout(showLogin, 5000);

function showLogin() {
    modal.style.display = "flex";
}
</script>

</body>
</html>
